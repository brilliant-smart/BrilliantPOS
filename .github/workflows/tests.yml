name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Backend: Lint + Test
  # ============================================================
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Composer dependencies
        run: cd backend && composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Check PHP Syntax Errors
        run: cd backend && find app -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || exit 1

  backend-tests:
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, mbstring, json, bcmath, dom, curl, fileinfo
          coverage: xdebug

      - name: Install Composer dependencies
        run: cd backend && composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run Backend Tests with Coverage
        run: cd backend && php artisan test --env=testing --coverage-text --coverage-clover=coverage.xml
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ============================================================
  # Frontend: Lint + Type-Check + Test
  # ============================================================
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type-Check
        run: cd frontend && npx tsc --noEmit

  frontend-tests:
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run Frontend Tests with Coverage
        run: cd frontend && npx vitest run --coverage
        env:
          VITE_API_BASE_URL: http://localhost:8000/api

      - name: Upload Frontend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ============================================================
  # E2E Tests (Playwright) — only on main/develop pushes
  # ============================================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: brilliantpos_test
          MYSQL_USER: brilliantpos
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json, bcmath, dom, curl, fileinfo, gd
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Configure backend environment
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=3306/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=laravel/DB_DATABASE=brilliantpos_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=brilliantpos/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=password/' .env
          sed -i 's/SESSION_DRIVER=database/SESSION_DRIVER=file/' .env
          sed -i 's/CACHE_STORE=database/CACHE_STORE=file/' .env
          sed -i 's/QUEUE_CONNECTION=database/QUEUE_CONNECTION=sync/' .env

      - name: Run backend migrations and seed
        run: cd backend && php artisan migrate --seed --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: brilliantpos_test
          DB_USERNAME: brilliantpos
          DB_PASSWORD: password

      - name: Start backend server
        run: cd backend && php artisan serve --host=0.0.0.0 --port=8000 &
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: brilliantpos_test
          DB_USERNAME: brilliantpos
          DB_PASSWORD: password

      - name: Wait for backend server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/api/login > /dev/null 2>&1; then
              echo "Backend server is ready"
              break
            fi
            echo "Waiting for backend server... ($i/30)"
            sleep 1
          done

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: cd frontend && npx playwright test
        env:
          CI: true
          VITE_API_BASE_URL: http://localhost:8000/api
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7